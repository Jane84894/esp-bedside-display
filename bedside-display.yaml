esphome:
  name: bedside-display
  friendly_name: 床头显示器
  min_version: 2024.11.0
  name_add_mac_suffix: false

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# 日志
logger:

# mDNS
mdns:
  disabled: false

# Home Assistant API
api:
  encryption:
    key: !secret api_key

# Improv Serial
improv_serial:

#  captive portal
captive_portal:

# OTA 更新
ota:
  - platform: esphome
    password: !secret ota_password

# WiFi 配置
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # 静态 IP (可选)
  manual_ip:
    static_ip: 192.168.2.201
    gateway: 192.168.2.1
    subnet: 255.255.255.0
  
  # AP 热点备份
  ap:
    ssid: "Clock Fallback Hotspot"
    password: !secret ap_password

# 背光 PWM
output:
  - platform: ledc
    pin: GPIO32
    id: backlight_pwm
    frequency: 1000Hz

# 背光控制
light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: screen_backlight
    restore_mode: RESTORE_DEFAULT_ON

# 颜色定义
color:
  - id: color_white
    red: 100%
    green: 100%
    blue: 100%
  - id: color_yellow
    red: 100%
    green: 80%
    blue: 10%
  - id: color_red
    red: 100%
    green: 30%
    blue: 30%
  - id: color_cyan
    red: 20%
    green: 90%
    blue: 100%
  - id: color_green
    red: 30%
    green: 100%
    blue: 30%
  - id: color_gray
    red: 40%
    green: 40%
    blue: 40%

# 光敏传感器 (自动亮度)
sensor:
  - platform: adc
    pin: GPIO34
    name: "Ambient Light Sensor"
    id: light_sensor
    update_interval: 1s
    attenuation: 11db
    filters:
      - sliding_window_moving_average:
          window_size: 3
          send_every: 1
      - calibrate_linear:
          - 3.18 -> 0.08  # 暗环境
          - 0.14 -> 1.00  # 亮环境
      - clamp:
          min_value: 0.08
          max_value: 1.0
    on_value:
      then:
        - light.turn_on:
            id: screen_backlight
            brightness: !lambda "return x;"
            transition_length: 1.5s

  # ESP32 内部温度
  - platform: internal_temperature
    name: "Internal Temperature"
  
  # 体感温度 (从 HA)
  - platform: homeassistant
    id: weather_feels_like
    name: "Feels Like Temperature"
    entity_id: sensor.openweathermap_apparent_temperature
    
  # 风速 (从 HA)
  - platform: homeassistant
    id: weather_wind_speed
    name: "Wind Speed"
    entity_id: sensor.openweathermap_wind_speed

  # 室内温度 (从 HA - ESPHome 其他设备)
  - platform: homeassistant
    id: hometemperture
    name: "Indoor Temperature"
    entity_id: sensor.esphome_web_living_room_temperature
  
  # 室内湿度 (从 HA)
  - platform: homeassistant
    id: homehunmidty
    name: "Indoor Humidity"
    entity_id: sensor.esphome_web_living_room_humidity
    
  # 室外温度 (从 HA - OpenWeatherMap)
  - platform: homeassistant
    id: homeweather
    name: "Outdoor Temperature"
    entity_id: sensor.openweathermap_temperature
  
  # 室外湿度 (从 HA)
  - platform: homeassistant
    id: homeweathershidu
    name: "Outdoor Humidity"
    entity_id: sensor.openweathermap_humidity

# Web 服务器 (可选)
web_server:
  port: 80

# SPI 配置 (屏幕)
spi:
  clk_pin: GPIO2
  mosi_pin: GPIO15

# 字体配置
font:
  - file: "gfonts://Roboto"
    id: font_time
    size: 36
    glyphs: "0123456789:"
    bpp: 4  
    
  - file: "gfonts://Roboto"
    id: font_value
    size: 18
    glyphs: "%°C.0123456789"
    bpp: 4

  - file: "gfonts://Noto Sans SC"
    id: font_title
    size: 18
    glyphs: "室内外"
    bpp: 4

  - file: "gfonts://Noto Sans SC"
    id: font_label
    size: 14
    glyphs: "体感风速：m/s%°C.0123456789"
    bpp: 4
    
  - file: "gfonts://materialdesignicons-webfont"
    id: font_icon
    size: 26
    bpp: 4
    glyphs:
      - "\U000F0599" # 晴天
      - "\U000F0594" # 夜晚
      - "\U000F0590" # 多云
      - "\U000F0597" # 雨天
      - "\U000F0598" # 雪天
      - "\U000F0593" # 雷雨

# 时间同步
time:
  - platform: homeassistant
    id: hass_time

# 天气状态 (用于图标)
text_sensor:
  - platform: homeassistant
    id: weather_state
    entity_id: sensor.openweathermap_weather
    internal: true

# 显示配置
display:
  - platform: ili9xxx
    model: ST7735
    dc_pin: GPIO17
    cs_pin: GPIO4
    reset_pin: GPIO16
    invert_colors: false
    show_test_card: false
    lambda: |-
      it.fill(Color::BLACK);

      // 天气图标逻辑
      std::string weather = id(weather_state).state;
      std::string icon = "\U000F0590"; 
      Color icon_color = id(color_white); 

      if (weather.find("雷") != std::string::npos) {
        icon = "\U000F0593"; 
        icon_color = id(color_yellow);
      } else if (weather.find("雨") != std::string::npos) {
        icon = "\U000F0597"; 
        icon_color = id(color_cyan);
      } else if (weather.find("雪") != std::string::npos) {
        icon = "\U000F0598"; 
        icon_color = id(color_white);
      } else if (weather.find("晴") != std::string::npos) {
        auto time = id(hass_time).now();
        if (time.hour >= 18 || time.hour < 6) {
          icon = "\U000F0594"; 
        } else {
          icon = "\U000F0599"; 
        }
        icon_color = id(color_yellow);
      } else if (weather.find("云") != std::string::npos || weather.find("阴") != std::string::npos) {
        icon = "\U000F0590"; 
        icon_color = id(color_gray);
      }

      // 绘制天气图标
      it.printf(6, 12, id(font_icon), icon_color, "%s", icon.c_str());
      
      // 绘制时间
      it.strftime(126, 4, id(font_time), id(color_white), TextAlign::TOP_RIGHT, "%H:%M", id(hass_time).now());

      // 分隔线
      it.line(10, 46, 118, 46, id(color_gray));
      it.line(64, 51, 64, 112, id(color_gray));

      // 室内区域
      it.print(32, 50, id(font_title), id(color_red), TextAlign::TOP_CENTER, "室内");
      it.printf(32, 74, id(font_value), id(color_white), TextAlign::TOP_CENTER, "%.1f°C", id(hometemperture).state);
      it.printf(32, 94, id(font_value), id(color_cyan), TextAlign::TOP_CENTER, "%.1f%%", id(homehunmidty).state);

      // 室外区域
      it.print(96, 50, id(font_title), id(color_green), TextAlign::TOP_CENTER, "室外");
      it.printf(96, 74, id(font_value), id(color_white), TextAlign::TOP_CENTER, "%.1f°C", id(homeweather).state);
      it.printf(96, 94, id(font_value), id(color_cyan), TextAlign::TOP_CENTER, "%.1f%%", id(homeweathershidu).state);

      // 底部区域 (体感温度 + 风速)
      it.filled_rectangle(0, 118, 128, 42, Color(40, 40, 40));
      it.printf(64, 120, id(font_label), id(color_yellow), TextAlign::TOP_CENTER, "体感：%.1f°C", id(weather_feels_like).state);
      it.printf(64, 138, id(font_label), id(color_white), TextAlign::TOP_CENTER, "风速：%.1f m/s", id(weather_wind_speed).state);
